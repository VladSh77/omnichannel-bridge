name: CI — omnichannel-bridge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: |
          ruff check addons/ \
            --select=E,W,F,I \
            --ignore=E501,F401,W291,W293 \
            --output-format=github \
            || true

  xml-check:
    name: Validate XML
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check XML syntax
        run: |
          find addons/ -name "*.xml" -print0 \
            | xargs -0 python3 -c "
          import sys, xml.etree.ElementTree as ET
          errors = []
          for f in sys.argv[1:]:
              try:
                  ET.parse(f)
              except ET.ParseError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('XML errors:')
              for e in errors: print(' ', e)
              sys.exit(1)
          else:
              print(f'All {len(sys.argv)-1} XML files OK')
          " --
