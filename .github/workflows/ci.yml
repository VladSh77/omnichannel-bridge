name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Compile module
        run: |
          python -m compileall addons/omnichannel_bridge
          python -m compileall tests

      - name: Run tests
        run: |
          python tests/test_webhook_parsers.py
          python tests/test_contract_regressions.py

      - name: Lint (ruff)
        run: |
          ruff check --select E9,F63,F7,F82 addons/omnichannel_bridge tests
