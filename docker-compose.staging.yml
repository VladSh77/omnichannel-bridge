version: '3.8'

services:
  # PostgreSQL database for Odoo
  db:
    image: postgres:15-alpine
    container_name: campscout_staging_db
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: campscout_staging
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campscout_staging

  # Redis for Odoo session/cache backend
  redis:
    image: redis:7-alpine
    container_name: campscout_staging_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - campscout_staging

  # Odoo web service
  web:
    image: odoo:17-staging
    container_name: campscout_staging_web
    build:
      context: .
      dockerfile: Dockerfile.staging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      HOST: db
      PORT: 5432
      USER: odoo
      PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: campscout_staging
      # Odoo settings
      ODOO_MASTER_PASS: ${ODOO_MASTER_PASS:-admin}
      # Session/cache
      SESSION_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # LLM/AI backend (staging-only)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Omnichannel bridge settings
      OMNI_ENVIRONMENT: staging
      WEBHOOK_DOMAIN: ${WEBHOOK_DOMAIN:-staging.campscout.eu}
      # Integrations (test credentials only)
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ADDONS: omnichannel_bridge,website,sale,mail,crm
    ports:
      - "8069:8069"  # Web UI
      - "8072:8072"  # Live chat
    volumes:
      # Omnichannel bridge addon
      - ./addons/omnichannel_bridge:/mnt/extra-addons/omnichannel_bridge
      # Other custom addons
      - ./addons:/mnt/extra-addons
      # Filestore
      - odoo_files:/var/lib/odoo/filestore
    command: >
      odoo
      --db_host=db
      --db_user=odoo
      --db_password=${DB_PASSWORD:-changeme}
      --database=campscout_staging
      --xmlrpc-interface=0.0.0.0
      --xmlrpc-port=8069
      --addons-path=/mnt/extra-addons
      --log-level=info
      --workers=4
      --max-cron-threads=1
    networks:
      - campscout_staging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional Ollama AI backend (local fallback)
  ollama:
    image: ollama/ollama:latest
    container_name: campscout_staging_ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    profiles:
      - local-ai  # Only start if needed: docker compose --profile local-ai up
    networks:
      - campscout_staging

  # Test data provisioning job (runs once at startup)
  init:
    image: odoo:17-staging
    container_name: campscout_staging_init
    build:
      context: .
      dockerfile: Dockerfile.staging
    depends_on:
      web:
        condition: service_healthy
    environment:
      HOST: web
      PORT: 8069
    volumes:
      - ./scripts/staging_bootstrap.py:/staging_bootstrap.py
    command: >
      python3 /staging_bootstrap.py
    networks:
      - campscout_staging
    profiles:
      - init  # Only run once: docker compose --profile init up init

volumes:
  pg_data:
    driver: local
  odoo_files:
    driver: local
  ollama_models:
    driver: local

networks:
  campscout_staging:
    driver: bridge
